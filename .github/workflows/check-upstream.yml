name: Check for new upstream releases

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/prometheus/node_exporter/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream: ${LATEST}"

      - name: Get current tracked version
        id: current
        run: |
          VERSION=$(grep -E '^%global upstream_version' SPECS/node_exporter.spec \
            | awk '{print $3}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Currently tracked: ${VERSION}"

      - name: Check if update is needed
        id: needs_update
        run: |
          if [ "${{ steps.upstream.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update spec and push tag
        if: steps.needs_update.outputs.needed == 'true'
        env:
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update the upstream_version in the spec
          sed -i "s/^%global upstream_version .*/%global upstream_version ${NEW_VERSION}/" \
            SPECS/node_exporter.spec

          # Prepend a changelog entry
          DATE=$(date "+%a %b %d %Y")
          CHANGELOG_ENTRY="* ${DATE} CI Pipeline <ci@example.com> - ${NEW_VERSION}-1\n- Bump to upstream ${NEW_VERSION}\n"
          sed -i "/^%changelog/a\\${CHANGELOG_ENTRY}" SPECS/node_exporter.spec

          git add SPECS/node_exporter.spec
          git commit -m "chore: bump node_exporter to v${NEW_VERSION}"
          git push origin main

          # Push a version tag — this triggers build-rpm.yml
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
