name: Check for new upstream releases

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/prometheus/node_exporter/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream: ${LATEST}"

      - name: Get current tracked version
        id: current
        run: |
          VERSION=$(grep -E '^%global upstream_version' SPECS/node_exporter.spec \
            | awk '{print $3}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Currently tracked: ${VERSION}"

      - name: Check if update is needed
        id: needs_update
        run: |
          if [ "${{ steps.upstream.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: ${{ steps.current.outputs.version }}"
          fi

      - name: Install git-cliff
        if: steps.needs_update.outputs.needed == 'true'
        run: |
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/git-cliff.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo install -m 755 "/tmp/git-cliff-2.4.0-x86_64-unknown-linux-gnu/git-cliff" /usr/local/bin/git-cliff

      - name: Update spec file
        if: steps.needs_update.outputs.needed == 'true'
        env:
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          DATE=$(date "+%a %b %d %Y")

          # Update tracked version
          sed -i "s/^%global upstream_version .*/%global upstream_version ${NEW_VERSION}/" \
            SPECS/node_exporter.spec

          # Prepend RPM changelog entry (required by rpmbuild)
          ENTRY="* ${DATE} github-actions[bot] <github-actions[bot]@users.noreply.github.com> - ${NEW_VERSION}-1\n- Bump to upstream ${NEW_VERSION}\n"
          sed -i "/^%changelog/a\\${ENTRY}" SPECS/node_exporter.spec

      - name: Update CHANGELOG.md
        if: steps.needs_update.outputs.needed == 'true'
        env:
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          # --unreleased --tag treats current HEAD commits as the new version;
          # --prepend adds the new entry at the top of the existing CHANGELOG.md
          git-cliff --config cliff.toml \
            --unreleased --tag "v${NEW_VERSION}" \
            --prepend CHANGELOG.md

      - name: Commit and push
        if: steps.needs_update.outputs.needed == 'true'
        env:
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add SPECS/node_exporter.spec CHANGELOG.md
          git commit -m "chore: bump node_exporter to v${NEW_VERSION}"
          git push origin main

          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Dispatch RPM build and release
        if: steps.needs_update.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          # Tag pushes from GITHUB_TOKEN do NOT trigger other workflows.
          # workflow_dispatch via the REST API is not subject to that restriction.
          # We pass upstream_version and create_release=true explicitly because
          # github.ref for a workflow_dispatch may not resolve as refs/tags/...
          # even when --ref points to a tag, so the release condition cannot rely
          # solely on startsWith(github.ref, 'refs/tags/v').
          gh workflow run build-rpm.yml \
            --ref "v${NEW_VERSION}" \
            -f upstream_version="${NEW_VERSION}" \
            -f create_release=true
